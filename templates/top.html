<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年齢確認｜ラブドール検索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { border-radius: 0 !important; }
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #b8d4e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }
        .age-verify-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0, 80, 120, 0.15);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(120, 180, 220, 0.3);
            text-align: center;
        }
        .age-verify-container h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a4b6d;
            margin-bottom: 10px;
        }
        .age-verify-container .icon {
            font-size: 4rem;
            color: #1a6b8a;
            margin-bottom: 20px;
        }
        .age-verify-container p {
            font-size: 1.1rem;
            color: #4a3a3a;
            margin-bottom: 30px;
        }
        .btn-age-yes {
            background: #4a9ec4;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-age-yes:hover {
            background: #2a7a9e;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(42, 122, 158, 0.4);
        }
        .btn-age-no {
            background: #c0dce8;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a4b6d;
            transition: 0.2s;
            width: 100%;
        }
        .btn-age-no:hover {
            background: #a8c8d8;
        }
    </style>
</head>
<body>
    <div class="age-verify-container">
        <div class="icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h1>年齢確認</h1>
        <p>このサイトは18歳以上の方を対象としています。<br>あなたは18歳以上ですか？</p>

        <form method="POST" action="{{ url_for('age_verify') }}">
            <button type="submit" name="age_confirm" value="yes" class="btn-age-yes"><i class="bi bi-check-circle me-2"></i>はい、18歳以上です</button>
            <button type="submit" name="age_confirm" value="no" class="btn-age-no"><i class="bi bi-x-circle me-2"></i>いいえ、18歳未満です</button>
        </form>
    </div>

    {% include 'footer.html' %}
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年齢確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { border-radius: 0 !important; }
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #b8d4e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .age-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0, 80, 120, 0.15);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(120, 180, 220, 0.25);
            text-align: center;
        }
        .age-container h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a4b6d;
            margin-bottom: 10px;
        }
        .age-container .icon {
            font-size: 4rem;
            color: #3a8bb5;
            margin-bottom: 20px;
        }
        .age-container p {
            font-size: 1.1rem;
            color: #2c6b8a;
            margin-bottom: 30px;
        }
        .btn-yes {
            background: linear-gradient(135deg, #4a9ec4, #2a7a9e);
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(42, 122, 158, 0.4);
        }
        .btn-no {
            background: #c0dce8;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a4b6d;
            transition: 0.2s;
            width: 100%;
        }
        .btn-no:hover {
            background: #a8c8d8;
        }
        .warning {
            font-size: 0.85rem;
            color: #6a8a9a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="age-container">
        <div class="icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <h1>年齢確認</h1>
        <p>このサイトは成人向けの情報を含みます。<br>あなたは18歳以上ですか？</p>
        <form method="POST" action="{{ url_for('age_verify') }}">
            <button type="submit" name="age_confirm" value="yes" class="btn btn-yes">はい</button>
            <button type="submit" name="age_confirm" value="no" class="btn btn-no">いいえ</button>
        </form>
        <p class="warning"><i class="bi bi-shield-lock me-1"></i>18歳未満の方はアクセスできません。</p>
    </div>
    {% include 'footer.html' %}
</body>
</html>

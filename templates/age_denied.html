<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス拒否</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * { border-radius: 0 !important; }
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #b8d4e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .denied-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0, 80, 120, 0.15);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(120, 180, 220, 0.25);
            text-align: center;
        }
        .denied-container h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #b34a4a;
            margin-bottom: 10px;
        }
        .denied-container .icon {
            font-size: 4rem;
            color: #b34a4a;
            margin-bottom: 20px;
        }
        .denied-container p {
            font-size: 1.1rem;
            color: #4a3a3a;
            margin-bottom: 30px;
        }
        .btn-back {
            background: #c0dce8;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a4b6d;
            transition: 0.2s;
            width: 100%;
        }
        .btn-back:hover {
            background: #a8c8d8;
        }
    </style>
</head>
<body>
    <div class="denied-container">
        <div class="icon"><i class="bi bi-ban-fill"></i></div>
        <h1>アクセスできません</h1>
        <p>18歳未満の方はこのサイトをご利用いただけません。</p>
        <button class="btn-back" onclick="history.back()"><i class="bi bi-arrow-left me-2"></i>戻る</button>
    </div>
</body>
</html>

<footer class="footer fixed-bottom" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); border-top: 1px solid #dee2e6; padding: 4px 0; font-size: 0.55rem; z-index: 1030;">
    <div class="container-fluid">
        <div class="row align-items-center">
            <!-- 左：法的表記（全ページ共通） -->
            <div class="col-12 col-md-6 text-center text-md-start text-muted" style="font-size: 0.55rem; line-height: 1.4;">
                <span>当サイトはアフィリエイト広告を利用しています。</span>
                <span class="mx-1">｜</span>
                <a href="{{ url_for('legal') }}" class="text-decoration-none text-muted">特定商取引法</a>
                <span class="mx-1">｜</span>
                <a href="{{ url_for('privacy') }}" class="text-decoration-none text-muted">プライバシーポリシー</a>
            </div>

            <!-- 右：広告（年齢確認後のみ表示） -->
            <div class="col-12 col-md-6 text-center text-md-end" style="min-height: 50px;">
                {% if session.get('age_verified') %}
                    <div id="ad-slot-bottom" style="display: inline-block; max-width: 100%;">
                        <script src="https://adm.shinobi.jp/s/f09ef3b5301cad6c264dd7e06ac36d0b"></script>
                    </div>
                {% else %}
                    <!-- 年齢確認前は空欄 -->
                {% endif %}
            </div>
        </div>
    </div>
</footer>

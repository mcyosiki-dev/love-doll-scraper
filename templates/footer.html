<footer class="footer fixed-bottom" style="background: rgba(224, 242, 254, 0.85); backdrop-filter: blur(2px); border: none; padding: 2px 0; font-size: 0.55rem; z-index: 1030; min-height: auto;">
    <div class="container-fluid">
        <div class="row align-items-center" style="margin: 0;">
            <!-- 左：法的表記 -->
            <div class="col-12 col-md-5 text-center text-md-start text-muted" style="font-size: 0.55rem; line-height: 1.3; padding: 2px 0;">
                <span>当サイトはアフィリエイト広告を利用しています。</span>
                <span class="mx-1">｜</span>
                <a href="{{ url_for('legal') }}" class="text-decoration-none text-muted">特定商取引法</a>
                <span class="mx-1">｜</span>
                <a href="{{ url_for('privacy') }}" class="text-decoration-none text-muted">プライバシーポリシー</a>
            </div>

            <!-- 右：広告（年齢確認後のみ表示） -->
            <div class="col-12 col-md-7 text-center text-md-end" style="padding: 2px 0; min-height: auto;">
                {% if session.get('age_verified') %}
                    <div id="ad-slot-bottom" style="display: block; max-width: 100%; text-align: center;">
                        <script src="https://adm.shinobi.jp/s/f09ef3b5301cad6c264dd7e06ac36d0b"></script>
                    </div>
                {% else %}
                    <!-- 年齢確認前は何も表示しない -->
                {% endif %}
            </div>
        </div>
    </div>
</footer>
